name: Build GlassVPN

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Build libhev_socks5_tunnel.so
        env:
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git clone --recurse-submodules https://github.com/heiher/hev-socks5-tunnel hev-src
          mkdir -p tmpndk/jni
          echo 'include $(call all-subdir-makefiles)' > tmpndk/jni/Android.mk
          ln -s $(pwd)/hev-src tmpndk/jni/hev-socks5-tunnel
          $ANDROID_NDK/ndk-build \
            NDK_PROJECT_PATH=tmpndk \
            APP_BUILD_SCRIPT=tmpndk/jni/Android.mk \
            "APP_ABI=arm64-v8a armeabi-v7a x86_64" \
            APP_PLATFORM=android-26 \
            NDK_LIBS_OUT=$(pwd)/app/src/main/jniLibs \
            NDK_OUT=$(pwd)/tmpndk/obj \
            "APP_CFLAGS=-O3 -DPKGNAME=com/glassvpn/app -DCLSNAME=TProxyService" \
            "APP_LDFLAGS=-Wl,--build-id=none -Wl,--hash-style=gnu"
          echo "Built .so files:"
          find app/src/main/jniLibs -name "*.so" | sort

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GlassVPN-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GlassVPN-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14
